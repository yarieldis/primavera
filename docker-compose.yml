services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: helloworld
      POSTGRES_USER: helloworld
      POSTGRES_PASSWORD: helloworld
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app-network

  app:
    build: .
    environment:
      SPRING_PROFILES_ACTIVE: dev
    ports:
      - "8080:8080"
    depends_on:
      - db
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  pgdata:
