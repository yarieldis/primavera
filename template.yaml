AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Primavera Spring Boot API on Lambda

Parameters:
  DbHost:
    Type: String
    Description: RDS PostgreSQL endpoint
  DbPort:
    Type: String
    Default: '5432'
  DbName:
    Type: String
    Default: primavera
  DbUser:
    Type: String
  DbPassword:
    Type: String
    NoEcho: true
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: VPC subnet IDs for Lambda (same VPC as RDS)
  SecurityGroupIds:
    Type: List<AWS::EC2::SecurityGroup::Id>
    Description: Security group IDs allowing access to RDS

Globals:
  Function:
    Timeout: 30
    MemorySize: 512

Resources:
  PrimaveraApi:
    Type: AWS::Serverless::HttpApi

  PrimaveraFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: com.github.primavera.StreamLambdaHandler::handleRequest
      Runtime: java21
      CodeUri: .
      SnapStart:
        ApplyOn: PublishedVersions
      AutoPublishAlias: live
      Environment:
        Variables:
          SPRING_PROFILES_ACTIVE: lambda
          DB_HOST: !Ref DbHost
          DB_PORT: !Ref DbPort
          DB_NAME: !Ref DbName
          DB_USER: !Ref DbUser
          DB_PASSWORD: !Ref DbPassword
      VpcConfig:
        SubnetIds: !Ref SubnetIds
        SecurityGroupIds: !Ref SecurityGroupIds
      Policies:
        - VPCAccessPolicy: {}
      Events:
        ApiRoot:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrimaveraApi
            Path: /
            Method: ANY
        ApiProxy:
          Type: HttpApi
          Properties:
            ApiId: !Ref PrimaveraApi
            Path: /{proxy+}
            Method: ANY

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub "https://${PrimaveraApi}.execute-api.${AWS::Region}.amazonaws.com"
